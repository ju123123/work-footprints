services:
  mysql:
    image: mysql:8.0
    environment:
      MYSQL_ROOT_PASSWORD: root
      MYSQL_DATABASE: workfootprint
    ports:
      - "3306:3306"
    command: ["--character-set-server=utf8mb4","--collation-server=utf8mb4_unicode_ci"]
    volumes:
      - mysql_data:/var/lib/mysql

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  backend:
    build:
      context: ../backend
    environment:
      DB_URL: jdbc:mysql://mysql:3306/workfootprint?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai
      DB_USERNAME: root
      DB_PASSWORD: root
      REDIS_HOST: redis
      REDIS_PORT: 6379
      JWT_SECRET: change-me-in-prod-change-me-in-prod
      DEFAULT_USERNAME: admin
      DEFAULT_PASSWORD: admin123
    ports:
      - "8080:8080"
    depends_on:
      - mysql
      - redis

  frontend:
    build:
      context: ../frontend
    environment:
      - NGINX_PORT=80
    ports:
      - "3000:80"
    depends_on:
      - backend

volumes:
  mysql_data:
  redis_data:

