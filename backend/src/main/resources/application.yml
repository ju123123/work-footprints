server:
  port: 8080

spring:
  application:
    name: workfootprint-backend
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/workfootprint?useUnicode=true&characterEncoding=utf8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:root}
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
  flyway:
    enabled: true
    locations: classpath:db/migration

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true

workfootprint:
  auth:
    jwt-secret: ${JWT_SECRET:change-me-in-prod-change-me-in-prod}
    jwt-expire-seconds: ${JWT_EXPIRE_SECONDS:604800}
    default-username: ${DEFAULT_USERNAME:admin}
    default-password: ${DEFAULT_PASSWORD:admin123}
  ai:
    base-url: ${AI_BASE_URL:}
    api-key: ${AI_API_KEY:}
    model: ${AI_MODEL:gpt-4o-mini}
  dingtalk:
    enabled: ${DINGTALK_ENABLED:false}
    token: ${DINGTALK_TOKEN:}
    aes-key: ${DINGTALK_AES_KEY:}
    app-key: ${DINGTALK_APP_KEY:}

management:
  endpoints:
    web:
      exposure:
        include: health,info

